# P10-AlphaRadar 主配置
# 敏感信息（API keys、密码）只从环境变量读取，不写在这里

app:
  name: AlphaRadar
  timezone: Asia/Shanghai
  log_level: INFO

database:
  pool_min: 5
  pool_max: 20
  command_timeout: 60

data_pipeline:
  timeout_seconds: 900        # 数据拉取超时（15分钟）
  batch_size: 100000           # 批量写入大小
  retry_times: 3
  retry_delay_seconds: 30

telegram:
  daily_push_limit: 5          # 每日推送上限
  response_timeout_seconds: 30

llm:
  # DeepSeek V3 (主力分析)
  deepseek:
    max_tokens: 2000
    temperature: 0.3
  # Qwen3-Mini (轻量任务)
  qwen:
    max_tokens: 1000
    temperature: 0.2
  # Embedding
  embedding:
    dimension: 1024
    batch_size: 32
