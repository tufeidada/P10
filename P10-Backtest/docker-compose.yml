version: "3.8"

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: p10_backtest_db
    environment:
      POSTGRES_USER: backtest
      POSTGRES_PASSWORD: backtest123
      POSTGRES_DB: backtest
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtest -d backtest"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: p10_backtest_pgdata
